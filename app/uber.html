<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Trafficly Uber</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --ink: #111827;
      --muted: #64748b;
      --line: #dbe3ef;
      --blue: #1a73e8;
      --blue-dark: #185abc;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 760px;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 8px;
    }

    a {
      font: inherit;
    }

    .shell {
      display: flex;
      flex-direction: column;
      width: min(1040px, 100%);
      min-height: 744px;
      max-height: calc(100vh - 16px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.12);
      flex: 0 0 auto;
    }

    .brand-subtitle {
      margin: 3px 0 0 18px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      max-width: 46%;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status.success {
      background: #ecfdf5;
      color: var(--green);
    }

    .status.error {
      background: #fef2f2;
      color: var(--red);
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
    }

    .empty,
    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }

    .empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
      font-size: 15px;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 680px;
      padding: 8px;
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 8px 0;
    }

    .primary-action,
    .secondary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 15px;
      border-radius: 8px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary-action {
      background: #000000;
      color: #ffffff;
    }

    .secondary-action {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .route {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .route-point {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 100%;
      color: #334155;
      font-size: 12px;
    }

    .pin {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .pin.pickup {
      background: var(--blue);
    }

    .pin.dropoff {
      background: var(--red);
    }

    .route-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frame-wrap {
      flex: 1;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface-soft);
      min-height: 600px;
    }

    .uber-frame {
      display: block;
      width: 100%;
      min-height: 680px;
      height: 72vh;
      border: 0;
      background: #ffffff;
    }

    .json-details {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #0f172a;
      color: #dbeafe;
      font: 12px/1.45 Consolas, "Liberation Mono", monospace;
      overflow: auto;
      max-height: 180px;
      white-space: pre-wrap;
    }

    @media (max-width: 520px) {
      body {
        padding: 6px;
      }

      html,
      body {
        min-height: 680px;
      }

      .shell {
        min-height: 668px;
        max-height: calc(100vh - 12px);
      }

      .header {
        padding: 10px 12px;
      }

      .brand-subtitle {
        display: none;
      }

      .status {
        max-width: 42%;
      }

      .content {
        padding: 6px;
      }

      .primary-action,
      .secondary-action {
        width: 100%;
      }

      .uber-frame {
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-live="polite">
    <header class="header">
      <div class="brand">
        <h1 class="brand-title"><span class="brand-dot"></span>Trafficly Uber</h1>
        <p class="brand-subtitle" id="subtitle">Open a prefilled ride request in Uber</p>
      </div>
      <div class="status" id="status-pill">Waiting</div>
    </header>

    <section class="content" id="content">
      <div class="empty">
        <div>
          <strong>Waiting for Uber link</strong>
          <span>Trafficly will show a prefilled Uber ride handoff here.</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var statusPill = document.getElementById("status-pill");
      var subtitle = document.getElementById("subtitle");
      var content = document.getElementById("content");

      function asText(value, fallback) {
        if (value === null || typeof value === "undefined" || value === "") return fallback || "";
        return String(value);
      }

      function escapeHtml(value) {
        return asText(value).replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char];
        });
      }

      function setStatus(text, kind) {
        statusPill.textContent = text;
        statusPill.className = "status" + (kind ? " " + kind : "");
      }

      function getNested(object, names) {
        for (var i = 0; i < names.length; i += 1) {
          if (object && typeof object[names[i]] !== "undefined") return object[names[i]];
        }
        return undefined;
      }

      function formatPlace(value) {
        if (value === null || typeof value === "undefined" || value === "") return "";
        if (typeof value === "string" || typeof value === "number") return String(value);

        if (typeof value === "object") {
          var label = getNested(value, ["addressLine1", "label", "address", "name", "formatted_address"]);
          var address = getNested(value, ["addressLine2"]);
          if (label && address && label !== address) return String(label) + " - " + String(address);
          if (label) return String(label);

          var lat = getNested(value, ["latitude", "lat"]);
          var lng = getNested(value, ["longitude", "lng", "lon"]);
          if (typeof lat !== "undefined" && typeof lng !== "undefined") {
            return Number(lat).toFixed(5) + ", " + Number(lng).toFixed(5);
          }
        }

        return String(value);
      }

      function parseJsonMaybe(value) {
        if (typeof value !== "string") return null;
        try {
          return JSON.parse(value);
        } catch (_) {
          return null;
        }
      }

      function extractTextJson(result) {
        var contentItems = result && result.content;
        if (!Array.isArray(contentItems)) return null;

        for (var i = 0; i < contentItems.length; i += 1) {
          var item = contentItems[i];
          var text = item && (item.text || item.content);
          var parsed = parseJsonMaybe(text);
          if (parsed) return parsed;
        }
        return null;
      }

      function normalizePayload(result) {
        if (!result) return null;
        if (result.structuredContent) return result.structuredContent;
        if (result.structured_content) return result.structured_content;

        var parsedText = extractTextJson(result);
        if (parsedText) return parsedText;

        if (result.toolOutput) return normalizePayload(result.toolOutput);
        return result;
      }

      function findUberUrl(payload) {
        return (
          payload.uber_url ||
          getNested(payload, ["data"]) && payload.data.uber_url ||
          getNested(payload, ["url"]) ||
          ""
        );
      }

      function renderRoute(data) {
        var pickup = data.pickup;
        var dropoffs = Array.isArray(data.dropoffs) ? data.dropoffs : [];
        var rows = [];

        if (pickup) {
          rows.push('<div class="route-point"><span class="pin pickup"></span><span class="route-label">' + escapeHtml(formatPlace(pickup)) + '</span></div>');
        }
        dropoffs.forEach(function (dropoff, index) {
          rows.push('<div class="route-point"><span class="pin dropoff"></span><span class="route-label">' + escapeHtml((index < dropoffs.length - 1 ? "Stop: " : "Dropoff: ") + formatPlace(dropoff)) + '</span></div>');
        });

        return rows.length ? '<div class="route">' + rows.join("") + '</div>' : "";
      }

      function renderHandoff(payload) {
        var data = payload.data || payload;
        var uberUrl = findUberUrl(payload);
        if (!uberUrl) {
          renderError({
            message: "Trafficly did not receive an Uber URL.",
            received: payload
          });
          return;
        }

        setStatus("Ready", "success");
        subtitle.textContent = "Uber will handle pricing and booking";
        content.innerHTML = [
          '<div class="panel">',
          '<div class="actions">',
          '<a class="primary-action" href="' + escapeHtml(uberUrl) + '" target="_blank" rel="noopener noreferrer">Open Uber</a>',
          '<a class="secondary-action" href="' + escapeHtml(uberUrl) + '" target="_blank" rel="noopener noreferrer">Open in new tab</a>',
          '</div>',
          '<div class="frame-wrap"><iframe class="uber-frame" src="' + escapeHtml(uberUrl) + '" title="Uber ride handoff" referrerpolicy="no-referrer"></iframe></div>',
          renderRoute(data),
          '</div>'
        ].join("");
      }

      function renderError(payload) {
        setStatus("Needs Attention", "error");
        subtitle.textContent = "Uber link could not be created";
        content.innerHTML = [
          '<div class="panel">',
          '<h2>' + escapeHtml(payload.title || "Uber request failed") + '</h2>',
          '<p>' + escapeHtml(payload.message || payload.error || "Trafficly could not read this Uber result.") + '</p>',
          '<div class="json-details">' + escapeHtml(JSON.stringify(payload, null, 2)) + '</div>',
          '</div>'
        ].join("");
      }

      function renderPayload(payload) {
        if (!payload || typeof payload !== "object") {
          renderError({ message: "Trafficly did not receive a structured Uber result." });
          return;
        }

        if (payload.intent === "error") {
          renderError(payload);
          return;
        }

        if (payload.intent === "uber_handoff" || findUberUrl(payload)) {
          renderHandoff(payload);
          return;
        }

        renderError({
          message: payload.message || "Trafficly received an Uber result, but it did not include a handoff URL.",
          received: payload
        });
      }

      window.TrafficlyUber = {
        receiveToolResult: function (result, source) {
          console.log("[trafficly-uber] Received from " + source + ":", result);
          renderPayload(normalizePayload(result));
        }
      };
    })();
  </script>

  <script>
    (function () {
      "use strict";

      window.TrafficlyFallbackBridge = {
        connect: function () {
          window.addEventListener("message", function (event) {
            var data = event.data || {};

            if (data.type === "tool_result" || data.type === "ui/notifications/tool-result") {
              window.TrafficlyUber.receiveToolResult(data.result || data.params || data, "postMessage");
            }

            if (data.method === "ui/notifications/tool-result") {
              window.TrafficlyUber.receiveToolResult(data.params || data, "json-rpc");
            }
          });
        }
      };

      window.TrafficlyFallbackBridge.connect();
    })();
  </script>

  <script type="module">
    (async () => {
      try {
        const module = await import("https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps");
        const app = new module.App({ name: "trafficly-uber", version: "1.0.0" });
        app.ontoolresult = (result) => {
          window.TrafficlyUber.receiveToolResult(result, "ext-apps");
        };
        await app.connect();
      } catch (error) {
        console.warn("[trafficly-uber] ext-apps bridge unavailable; inline fallback remains active.", error);
      }
    })();
  </script>

  <script>
    (function () {
      "use strict";

      function useOpenAIToolOutput() {
        var openai = window.openai;
        if (!openai || typeof openai.toolOutput === "undefined") return;

        try {
          if (openai.toolOutput && typeof openai.toolOutput.then === "function") {
            openai.toolOutput.then(function (toolOutput) {
              window.TrafficlyUber.receiveToolResult(toolOutput, "openai-toolOutput");
            });
          } else {
            window.TrafficlyUber.receiveToolResult(openai.toolOutput, "openai-toolOutput");
          }
        } catch (error) {
          console.warn("[trafficly-uber] window.openai.toolOutput failed.", error);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", useOpenAIToolOutput);
      } else {
        useOpenAIToolOutput();
      }
    })();
  </script>
</body>
</html>
