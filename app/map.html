<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Trafficly</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2d3148;
      --accent: #3b82f6;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --warning: #f59e0b;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #shell {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    #header {
      display: none;
      flex-shrink: 0;
      align-items: center;
      gap: 12px;
      height: 52px;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #header.visible {
      display: flex;
    }

    #logo {
      flex-shrink: 0;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    #route-label {
      flex: 1;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #stats {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--border);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: #111;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg);
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-text {
      max-width: 280px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    #steps-drawer {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 800;
      display: none;
      max-height: 38%;
      padding: 10px 0 16px;
      overflow-y: auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #steps-drawer.visible {
      display: block;
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      line-height: 1.35;
    }

    .step-row:last-child {
      border-bottom: none;
    }

    .step-dist {
      flex-shrink: 0;
      width: 52px;
      color: var(--muted);
      text-align: right;
    }

    .leaflet-control-attribution {
      background: rgba(15, 17, 23, 0.72) !important;
      color: #64748b !important;
      font-size: 9px !important;
    }

    .leaflet-control-attribution a {
      color: #64748b !important;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Connecting to Trafficly...</div>
  </div>

  <div id="shell">
    <div id="header">
      <span id="logo">Trafficly</span>
      <span id="route-label"></span>
      <span id="stats"></span>
    </div>
    <div id="map"></div>
  </div>

  <div id="steps-drawer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    (function () {
      "use strict";

      var mapInstance = null;
      var pendingData = null;
      var leafletReady = false;
      var renderedPayloads = [];

      function setStatus(text) {
        var el = document.getElementById("loading-text");
        if (el) el.textContent = text;
      }

      function parseMaybeJson(value) {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value);
        } catch (_error) {
          return null;
        }
      }

      function extractPayload(result) {
        if (!result) return null;
        if (result.structuredContent) return result.structuredContent;
        if (result.structured_content) return result.structured_content;
        if (result.output && typeof result.output === "object") return result.output;
        if (result.content && Array.isArray(result.content)) {
          for (var i = 0; i < result.content.length; i += 1) {
            var block = result.content[i];
            if (block && block.type === "text") {
              var parsed = parseMaybeJson(block.text);
              if (parsed) return parsed;
            }
          }
        }
        if (typeof result === "object" && typeof result.origin_lat !== "undefined") {
          return result;
        }
        return null;
      }

      function receiveToolResult(result, source) {
        var payload = extractPayload(result);
        if (!payload || payload.error) {
          if (payload && payload.error) setStatus(payload.error);
          return;
        }
        if (typeof payload.origin_lat === "undefined") {
          console.warn("[trafficly] Ignoring unexpected payload from " + source, payload);
          return;
        }
        var fingerprint = JSON.stringify(payload);
        if (renderedPayloads.indexOf(fingerprint) !== -1) return;
        renderedPayloads.push(fingerprint);
        if (renderedPayloads.length > 3) renderedPayloads.shift();
        pendingData = payload;
        tryRender();
      }

      function decodePolyline(encoded) {
        var pts = [];
        var idx = 0;
        var lat = 0;
        var lng = 0;
        while (idx < encoded.length) {
          var b;
          var shift = 0;
          var result = 0;
          do {
            b = encoded.charCodeAt(idx++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          lat += (result & 1) ? ~(result >> 1) : (result >> 1);
          shift = 0;
          result = 0;
          do {
            b = encoded.charCodeAt(idx++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          lng += (result & 1) ? ~(result >> 1) : (result >> 1);
          pts.push([lat / 1e5, lng / 1e5]);
        }
        return pts;
      }

      function formatDist(meters) {
        return meters >= 1000 ? (meters / 1000).toFixed(1) + " km" : meters + " m";
      }

      function hasUsablePoint(lat, lng) {
        return typeof lat === "number" && typeof lng === "number" && (lat !== 0 || lng !== 0);
      }

      function renderMap(data) {
        var header = document.getElementById("header");
        header.classList.add("visible");
        document.getElementById("route-label").textContent =
          data.start_address + " -> " + data.end_address;
        document.getElementById("stats").textContent =
          data.distance_km + " km | " + data.duration_min + " min";

        if (mapInstance) {
          mapInstance.remove();
          mapInstance = null;
        }

        mapInstance = L.map("map", {
          zoomControl: false,
          attributionControl: true
        });

        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
          attribution: "&copy; <a href='https://carto.com/'>CARTO</a>",
          subdomains: "abcd",
          maxZoom: 19
        }).addTo(mapInstance);

        var coords = [];
        if (data.encoded_polyline) {
          coords = decodePolyline(data.encoded_polyline);
        }
        if (!coords.length && hasUsablePoint(data.origin_lat, data.origin_lng) && hasUsablePoint(data.dest_lat, data.dest_lng)) {
          coords = [
            [data.origin_lat, data.origin_lng],
            [data.dest_lat, data.dest_lng]
          ];
        }
        if (!coords.length) {
          setStatus("Trafficly received the route, but it did not include map coordinates.");
          return;
        }

        var routeLine = L.polyline(coords, {
          color: "#3b82f6",
          weight: 5,
          opacity: 0.85,
          lineJoin: "round"
        }).addTo(mapInstance);

        var iconStyle = "width:14px;height:14px;border-radius:50%;border:2px solid #fff;";
        var originIcon = L.divIcon({
          html: "<div style='" + iconStyle + "background:#1d4ed8'></div>",
          className: "",
          iconSize: [14, 14],
          iconAnchor: [7, 7]
        });
        var destIcon = L.divIcon({
          html: "<div style='" + iconStyle + "background:#dc2626'></div>",
          className: "",
          iconSize: [14, 14],
          iconAnchor: [7, 7]
        });

        if (hasUsablePoint(data.origin_lat, data.origin_lng)) {
          L.marker([data.origin_lat, data.origin_lng], { icon: originIcon })
            .bindTooltip(data.start_address, { direction: "top", sticky: false })
            .addTo(mapInstance);
        }
        if (hasUsablePoint(data.dest_lat, data.dest_lng)) {
          L.marker([data.dest_lat, data.dest_lng], { icon: destIcon })
            .bindTooltip(data.end_address, { direction: "top", sticky: false })
            .addTo(mapInstance);
        }

        if (Array.isArray(data.waypoints)) {
          data.waypoints.forEach(function (wp) {
            if (wp && hasUsablePoint(wp.latitude, wp.longitude)) {
              L.circleMarker([wp.latitude, wp.longitude], {
                radius: 5,
                color: "#f59e0b",
                fillColor: "#f59e0b",
                fillOpacity: 1
              }).addTo(mapInstance);
            }
          });
        }

        mapInstance.fitBounds(routeLine.getBounds(), { padding: [32, 32] });
        mapInstance.invalidateSize();
        setTimeout(function () {
          if (mapInstance) mapInstance.invalidateSize();
        }, 400);

        var drawer = document.getElementById("steps-drawer");
        drawer.innerHTML = "";
        drawer.classList.remove("visible");
        if (data.detail_level === "detailed" && Array.isArray(data.steps) && data.steps.length > 0) {
          data.steps.forEach(function (step) {
            var row = document.createElement("div");
            var dist = document.createElement("span");
            var text = document.createElement("span");
            row.className = "step-row";
            dist.className = "step-dist";
            dist.textContent = formatDist(step.distance_m || 0);
            text.textContent = step.instruction || "Continue";
            row.appendChild(dist);
            row.appendChild(text);
            drawer.appendChild(row);
          });
          drawer.classList.add("visible");
        }

        var loading = document.getElementById("loading");
        loading.classList.add("hidden");
        setTimeout(function () {
          loading.style.display = "none";
        }, 350);
      }

      function tryRender() {
        if (!pendingData) return;
        if (typeof L === "undefined" || !leafletReady) {
          setTimeout(tryRender, 80);
          return;
        }
        var data = pendingData;
        pendingData = null;
        renderMap(data);
      }

      window.TrafficlyMap = {
        receiveToolResult: receiveToolResult
      };

      document.addEventListener("DOMContentLoaded", function () {
        function checkLeaflet() {
          if (typeof L !== "undefined") {
            leafletReady = true;
            tryRender();
          } else {
            setTimeout(checkLeaflet, 50);
          }
        }
        checkLeaflet();
      });
    })();
  </script>

  <script>
    (function () {
      "use strict";

      var requestId = 1000;
      var origin = "*";
      var initialized = false;

      function rpc(method, params, id) {
        var msg = { jsonrpc: "2.0", method: method };
        if (id !== undefined) msg.id = id;
        if (params !== undefined) msg.params = params;
        window.parent.postMessage(msg, origin);
      }

      window.TrafficlyFallbackBridge = {
        connect: function () {
          rpc("ui/initialize", { name: "trafficly-map", version: "1.0.0" }, requestId++);
        }
      };

      window.addEventListener("message", function (event) {
        var msg = event.data;
        if (!msg || typeof msg !== "object" || msg.jsonrpc !== "2.0") return;
        if (origin === "*" && event.origin) origin = event.origin;
        if (msg.result !== undefined && msg.id && !initialized) {
          initialized = true;
          var loadingText = document.getElementById("loading-text");
          if (loadingText) loadingText.textContent = "Waiting for route data...";
          return;
        }
        if (msg.method === "ui/notifications/tool-result" && msg.params) {
          window.TrafficlyMap.receiveToolResult(msg.params.result, "fallback-postmessage");
        }
      });
    })();
  </script>

  <script type="module">
    (async function () {
      const bridge = window.TrafficlyFallbackBridge;
      try {
        const module = await import("https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps");
        const app = new module.App({ name: "trafficly-map", version: "1.0.0" });
        app.ontoolresult = (result) => {
          window.TrafficlyMap.receiveToolResult(result, "ext-apps");
        };
        await app.connect();
      } catch (error) {
        console.warn("[trafficly] ext-apps bridge unavailable; using inline fallback.", error);
        bridge.connect();
      }
    })();
  </script>

  <script>
    (function () {
      "use strict";

      function useOpenAIToolOutput() {
        var openai = window.openai;
        if (!openai || typeof openai.toolOutput === "undefined") return;
        try {
          if (openai.toolOutput && typeof openai.toolOutput.then === "function") {
            openai.toolOutput.then(function (toolOutput) {
              window.TrafficlyMap.receiveToolResult(toolOutput, "openai-toolOutput");
            });
          } else {
            window.TrafficlyMap.receiveToolResult(openai.toolOutput, "openai-toolOutput");
          }
        } catch (error) {
          console.warn("[trafficly] window.openai.toolOutput failed.", error);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", useOpenAIToolOutput);
      } else {
        useOpenAIToolOutput();
      }
      window.addEventListener("load", useOpenAIToolOutput);
    })();
  </script>
</body>
</html>
